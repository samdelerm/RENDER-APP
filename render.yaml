services:
  - type: web
    name: apprsk-server
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r StaticServer/requirements.txt
    startCommand: gunicorn --chdir StaticServer app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
